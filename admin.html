<!DOCTYPE html>
<html>
<head>
    <title>Quick Finder - Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .container {
            width: 60%;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
        }

        .box {
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .logout-btn {
            width: 100%;
            padding: 10px;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="header">
    Quick Finder - Admin Dashboard
</div>

<div class="container">

    <!-- Registered User Section -->
    <h2>Registered User Details</h2>
    <div id="userData" class="box"></div>

    <!-- Messages Section -->
    <h2>User Messages</h2>
    <div id="messages" class="box"></div>

    <button class="logout-btn" onclick="logout()">Logout</button>

</div>

<script>
/* ------------------------
   Show Registered User
-------------------------*/
var user = JSON.parse(localStorage.getItem("user"));

if(user){
    document.getElementById("userData").innerHTML =
        "<p><b>Name:</b> " + (user.name || "Not Available") + "</p>" +
        "<p><b>Email:</b> " + user.email + "</p>" +
        "<p><b>Password:</b> " + user.password + "</p>";
}
else{
    document.getElementById("userData").innerHTML = "No users registered.";
}


/* ------------------------
   Load Messages from Backend
-------------------------*/
function loadMessages() {
    fetch("http://localhost:5000/get-messages")
    .then(res => res.json())
    .then(data => {
        let output = "";
        data.forEach(msg => {
            output += "<div class='box'>" + msg + "</div>";
        });
        document.getElementById("messages").innerHTML = output;
    })
    .catch(() => {
        document.getElementById("messages").innerHTML = "No messages found or server not running.";
    });
}

loadMessages();


/* ------------------------
   Logout
-------------------------*/
function logout(){
    localStorage.removeItem("loggedInUser");
    alert("Logged out successfully!");
    window.location.href = "loginpage.html";
}
</script>

</body>
</html>
